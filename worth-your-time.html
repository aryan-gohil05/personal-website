<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worth Your Time — Aryan Gohil</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Aryan Gohil">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">

    <!--Cloudflare Analytics-->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "febf392956454689b9e67f3caac8111e"}'></script>
</head>
<body>

    <!-- Mobile fixed nav bar (hidden on desktop via CSS) -->
    <nav class="wyt-nav" aria-label="Page navigation">
        <a href="index.html" class="wyt-nav-btn">
            <span class="wyt-nav-icon">←</span>
            <span>Back</span>
        </a>
        <span class="wyt-nav-btn wyt-nav-section">Books</span>
        <span class="wyt-nav-btn"></span>
    </nav>

    <!-- Desktop header (hidden on mobile via CSS) -->
    <header class="wyt-desktop-header">
        <div class="header-main">
            <span class="header-name">aryangohil.com</span>
            <span class="header-location">UK</span>
        </div>
    </header>

    <main id="wyt-main">
        <section class="wyt-section">
            <h1 class="wyt-section-label">Books</h1>

            <div class="wyt-cover-grid" id="cover-grid"></div>
        </section>
    </main>

    <!-- Mobile detail overlays — generated by script below -->
    <div id="detail-overlays"></div>

    <script>
        const books = [
            {
                id: "book-1",
                title: "The Millionaire Fastlane",
                author: "M.J. DeMarco",
                cover: "/images/books/fastlane_cover.jpg",
                link: "https://www.waterstones.com/book/the-millionaire-fastlane/mj-demarco/9780984358106",
                review: [
                    "This book completely changed how I think about money &amp; time, and it’s the reason I became interested in entrepreneurship.",
                    "At the start MJ DeMarco uses logic &amp; math to show the <em>’default’</em> path we’re sold — get a job, save 20% of salary, and let market investments compound — doesn’t build true wealth especially at a young age where you can enjoy it.",
                    "Then later in the book he uses business as a <em>’Fastlane’</em> vehicle for building scalable systems that generate passive income and financial freedom within <strong>5-10 years</strong>.",
                    "I will admit his language is abrasive, especially at the start of the book, but if you can get past that it’s genuinely worth reading.",
                    "I always recommend this book to anyone who is thinking of <strong>launching a business</strong>."
                ]
            },
            {
                id: "book-2",
                title: "The Black Hole War",
                author: "Leonard Susskind",
                cover: "/images/books/black-hole-war.jpg",
                link: "https://www.waterstones.com/book/the-black-hole-war/leonard-susskind/9780316016414",
                review: [
                    "Writing this up. Just give me a sec"
                ]
            },
            {
                id: "book-3",
                title: "Hitchhiker's Guide to the Galaxy - Volume 1",
                author: "Douglas Adams",
                cover: "/images/books/hitchhikers-1.jpg",
                link: "https://www.waterstones.com/book/the-hitchhikers-guide-to-the-galaxy/douglas-adams/9781529034523",
                review: [
                    "Writing this up. Just give me a sec"
                ]
            },
            {
                id: "book-4",
                title: "Atomic Habits",
                author: "James Clear",
                cover: "/images/books/atomic-habits.jpg",
                link: "https://www.waterstones.com/book/atomic-habits/james-clear/9781847941831",
                review: [
                    "I want to read this. I've heard good things"
                ]
            }
        ];

        const onerr = "this.style.display='none';this.nextElementSibling.style.display='flex';";

        document.getElementById("cover-grid").innerHTML = books.map(b => `
            <a href="#${b.id}" class="wyt-cover-item">
                <img src="${b.cover}" alt="${b.title}" class="wyt-cover-img" onerror="${onerr}">
                <div class="wyt-cover-fallback">${b.title}</div>
            </a>
        `).join("");

        document.getElementById("detail-overlays").innerHTML = books.map(b => `
            <div class="wyt-detail" id="${b.id}" role="dialog" aria-modal="true" aria-label="${b.title}">
                <div class="wyt-detail-bar">
                    <a href="#" class="wyt-detail-close" aria-label="Close">&#x2715;</a>
                    <span class="wyt-detail-label">Book</span>
                </div>
                <div class="wyt-detail-body">
                    <img class="wyt-detail-cover" src="${b.cover}" alt="${b.title}">
                    <h2 class="wyt-detail-title">${b.title}</h2>
                    <p class="wyt-detail-author">${b.author}</p>
                    <hr class="wyt-detail-divider">
                    <span class="wyt-detail-review-label">My take</span>
                    ${b.review.map(p => `<p class="wyt-detail-review">${p}</p>`).join("")}
                    <a class="wyt-detail-buy" href="${b.link}" target="_blank" rel="noopener noreferrer">Go buy it &#x2192;</a>
                </div>
            </div>
        `).join("");
    </script>

    <footer>
        All of these are worth looking into<br>
        &copy; Aryan Gohil
        <span id="year"></span>
        <script>document.getElementById("year").textContent = new Date().getFullYear();</script>. All rights reserved
    </footer>


</body>
</html>
